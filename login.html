<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STOZ | تسجيل الدخول</title>
    <style>
        :root { --v-red: #ff4655; --v-black: #0f1923; --v-white: #ece8e1; --v-dark-blue: #16212b; }
        @font-face { font-family: 'Valorant'; src: url('https://db.onlinewebfonts.com/t/20f666f225724598d9703f83733a1e9a.woff2') format('woff2'); }
        body { background-color: var(--v-black); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: radial-gradient(circle at center, #1b2733 0%, #0f1923 100%); }
        .auth-card { background: var(--v-dark-blue); padding: 40px; width: 100%; max-width: 400px; border-radius: 4px; border-top: 4px solid var(--v-red); text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h2 { font-family: 'Valorant', sans-serif; color: var(--v-red); margin-bottom: 30px; letter-spacing: 2px; }
        .social-login { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }
        .social-btn { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; }
        .google { background: white; color: #333; }
        .google:hover { background: #f1f1f1; transform: translateY(-2px); }
        .discord { background: #5865F2; color: white; }
        .separator { display: flex; align-items: center; text-align: center; margin: 25px 0; color: #7b7b7b; }
        .separator::before, .separator::after { content: ''; flex: 1; border-bottom: 1px solid #2a3541; }
        .separator:not(:empty)::before { margin-left: 15px; }
        .separator:not(:empty)::after { margin-right: 15px; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #2a3541; background: #0f1923; color: white; border-radius: 4px; box-sizing: border-box; outline: none; }
        .auth-btn { width: 100%; padding: 16px; background: var(--v-red); color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .auth-btn:hover { background: white; color: var(--v-red); }
        .switch-text { margin-top: 25px; font-size: 0.9rem; color: #7b7b7b; }
        .switch-text a { color: var(--v-red); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="auth-card">
        <h2>LOGIN TO STOZ</h2>
        <div class="social-login">
            <button class="social-btn google" id="googleLogin">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="18">
                دخول بواسطة Google
            </button>
            <button class="social-btn discord">
                <img src="https://assets-global.website-files.com/6257adef93467e4228518e0a/6257af109c16280327f309a4_discord_icon_white.svg" width="18">
                دخول بواسطة Discord
            </button>
        </div>
        <div class="separator">أو البريد الإلكتروني</div>
        <input type="email" placeholder="البريد الإلكتروني">
        <input type="password" placeholder="كلمة المرور">
        <button class="auth-btn">دخول</button>
        <div class="switch-text">ما عندك حساب؟ <a href="register.html">سجل الآن</a></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // تم تحديث الإعدادات بناءً على معلومات مشروعك الصحيحة
        const firebaseConfig = {
            apiKey: "AIzaSyDOrD2X_FzM6fE02XkrD4k6VWQ6GUQdqis",
            authDomain: "stoz-b0374.firebaseapp.com",
            projectId: "stoz-b0374",
            storageBucket: "stoz-b0374.firebasestorage.app",
            messagingSenderId: "226742805731",
            appId: "1:226742805731:web:0c10c5bfe3a007923cd1d6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        document.getElementById('googleLogin').addEventListener('click', () => {
            signInWithPopup(auth, provider)
                .then((result) => {
                    alert("أهلاً بك " + result.user.displayName);
                    window.location.href = "index.html";
                }).catch((error) => {
                    console.error("Firebase Error:", error);
                    alert("حدث خطأ في تسجيل الدخول. تأكد من تفعيل Google Provider في Firebase Console.");
                });
        });
    </script>
</body>
</html>
