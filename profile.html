<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STOZ | ملف اللاعب</title>
    <style>
        :root { --v-red: #ff4655; --v-black: #0f1923; --v-white: #ece8e1; --v-gray: #7b7b7b; --v-dark-blue: #16212b; }
        @font-face { font-family: 'Valorant'; src: url('https://db.onlinewebfonts.com/t/20f666f225724598d9703f83733a1e9a.woff2') format('woff2'); }
        body { background-color: var(--v-black); color: var(--v-white); font-family: 'Segoe UI', sans-serif; margin: 0; background: radial-gradient(circle at top, #16212b 0%, #0f1923 100%); }
        nav { padding: 20px 60px; border-bottom: 1px solid #1f2933; display: flex; justify-content: space-between; align-items: center; }
        .brand-logo { font-family: 'Valorant'; text-decoration: none; color: inherit; font-size: 1.5rem; }
        .brand-logo span { color: var(--v-red); }
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .profile-header { display: flex; align-items: center; gap: 30px; background: rgba(22, 33, 43, 0.5); padding: 40px; border-right: 4px solid var(--v-red); margin-bottom: 40px; }
        .player-avatar { width: 120px; height: 120px; border: 2px solid var(--v-red); padding: 5px; }
        .player-main-info h1 { margin: 0; font-family: 'Valorant'; font-size: 2.5rem; }
        .current-rank-box { margin-right: auto; text-align: center; }
        .rank-icon { width: 80px; }
        .profile-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 30px; }
        .section-box { background: var(--v-dark-blue); padding: 20px; border: 1px solid #2a3541; }
        .section-title { font-family: 'Valorant'; color: var(--v-red); margin-bottom: 20px; }
        .season-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #1f2933; }
        .skins-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .skin-card { background: #0f1923; border: 1px solid #2a3541; padding: 10px; text-align: center; }
        .skin-img { width: 100%; height: 80px; object-fit: contain; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="brand-logo">STO<span>Z</span></a>
        <a href="store.html" style="color: var(--v-gray); text-decoration: none;">🔙 عودة للبحث</a>
    </nav>
    <div class="container">
        <div class="profile-header">
            <img src="https://via.placeholder.com/120" class="player-avatar">
            <div class="player-main-info">
                <h1>Zaid<span>x4</span></h1>
                <span style="color: var(--v-gray);">#JOR</span>
            </div>
            <div class="current-rank-box">
                <img src="https://trackercdn.com/cdn/valorant/icons/ranks/diamond_3.png" class="rank-icon">
                <div style="color: var(--v-red); font-weight: bold;">DIAMOND 3</div>
            </div>
        </div>
        <div class="profile-grid">
            <div class="side-col">
                <div class="section-box">
                    <h3 class="section-title">تاريخ الرانك</h3>
                    <div class="season-item"><span>سيزون 8</span> <span style="color: var(--v-red);">Immortal 1</span></div>
                    <div class="season-item"><span>سيزون 7</span> <span>Diamond 2</span></div>
                </div>
            </div>
            <div class="main-col">
                <div class="section-box">
                    <h3 class="section-title">السكنات المميزة</h3>
                    <div class="skins-grid">
                        <div class="skin-card">
                            <img src="https://valorant-api.com/textures/v2/assets/images/weapons/skins/reaver_vandal.png" class="skin-img">
                            <span style="font-size: 0.8rem;">Reaver Vandal</span>
                        </div>
                        <div class="skin-card">
                            <img src="https://valorant-api.com/textures/v2/assets/images/weapons/skins/prime_vandal.png" class="skin-img">
                            <span style="font-size: 0.8rem;">Prime Vandal</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
