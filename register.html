<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STOZ | فتح حساب جديد</title>
    <style>
        :root { 
            --v-red: #ff4655; 
            --v-black: #0f1923; 
            --v-white: #ece8e1; 
            --v-dark-blue: #16212b;
        }

        @font-face { 
            font-family: 'Valorant'; 
            src: url('https://db.onlinewebfonts.com/t/20f666f225724598d9703f83733a1e9a.woff2') format('woff2'); 
        }

        body { 
            background-color: var(--v-black); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            background: radial-gradient(circle at center, #1b2733 0%, #0f1923 100%);
        }

        .auth-card { 
            background: var(--v-dark-blue); 
            padding: 40px; 
            width: 100%; 
            max-width: 400px; 
            border-radius: 4px; 
            border-top: 4px solid var(--v-red); 
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h2 { 
            font-family: 'Valorant', sans-serif; 
            color: var(--v-red); 
            margin-bottom: 25px; 
            letter-spacing: 2px;
            font-size: 1.8rem;
        }

        /* تنسيق أزرار التواصل الاجتماعي */
        .social-login { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            margin-bottom: 25px; 
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.95rem;
            width: 100%;
        }

        .google { background: white; color: #333; border: 1px solid #ddd; }
        .google:hover { background: #f1f1f1; transform: translateY(-2px); }
        
        .discord { background: #5865F2; color: white; }
        .discord:hover { background: #4752c4; transform: translateY(-2px); }

        .separator {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
            color: #7b7b7b;
            font-size: 0.85rem;
        }
        .separator::before, .separator::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #2a3541;
        }
        .separator:not(:empty)::before { margin-left: 15px; }
        .separator:not(:empty)::after { margin-right: 15px; }

        /* المدخلات */
        input { 
            width: 100%; 
            padding: 14px; 
            margin-bottom: 12px; 
            border: 1px solid #2a3541; 
            background: #0f1923; 
            color: white; 
            border-radius: 4px; 
            box-sizing: border-box; 
            outline: none; 
            transition: 0.3s;
        }
        input:focus { border-color: var(--v-red); box-shadow: 0 0 10px rgba(255, 70, 85, 0.2); }

        .auth-btn { 
            width: 100%; 
            padding: 16px; 
            background: var(--v-red); 
            color: white; 
            border: none; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            margin-top: 10px;
            font-size: 1rem;
            text-transform: uppercase;
        }
        .auth-btn:hover { background: white; color: var(--v-red); }

        .switch-text { 
            margin-top: 25px; 
            font-size: 0.9rem; 
            color: #7b7b7b; 
        }
        .switch-text a { 
            color: var(--v-red); 
            text-decoration: none; 
            font-weight: bold; 
        }
        .switch-text a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="auth-card">
        <h2>JOIN STOZ</h2>
        
        <div class="social-login">
            <button class="social-btn google" onclick="authWith('Google')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="18">
                تسجيل بواسطة Google
            </button>
            <button class="social-btn discord" onclick="authWith('Discord')">
                <img src="https://assets-global.website-files.com/6257adef93467e4228518e0a/6257af109c16280327f309a4_discord_icon_white.svg" width="18">
                تسجيل بواسطة Discord
            </button>
        </div>

        <div class="separator">أو إنشاء حساب يدوي</div>

        <input type="text" id="regUser" placeholder="اسم المستخدم (Username)">
        <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
        <input type="password" id="regPass" placeholder="كلمة المرور">
        
        <button class="auth-btn" onclick="handleRegister()">إنشاء حساب</button>
        
        <div class="switch-text">
            عندك حساب أصلاً؟ <a href="login.html">سجل دخولك هنا</a>
        </div>
    </div>

    <script>
        function authWith(platform) {
            alert("جاري تحضير الربط مع " + platform + " عبر Firebase...");
            window.location.href = "index.html";
        }

        function handleRegister() {
            const user = document.getElementById('regUser').value;
            if(user.trim() === "") {
                alert("يرجى تعبئة كافة الخانات");
                return;
            }
            alert("تم إنشاء حسابك في STOZ بنجاح!");
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
